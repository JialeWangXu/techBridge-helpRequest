# logging
logging:
  level:
    es.upm: DEBUG
    org.springframework.security: WARN

# H2 Embedded
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
  security:
    oauth2:
      client:
        registration:
          internal-client:
            client-id: "test-id"
            client-secret: "test-secret"
            provider: "my-provider"
            authorization-grant-type: client_credentials
        provider:
          my-provider:
            token-uri: http://localhost:8080/api/techbridge-user/oauth2/token

# Desactivar eureka en perfil de test
eureka:
  client:
    enabled: false
  instance:
    leaseRenewalIntervalInSeconds: 0
    leaseExpirationDurationInSeconds: 0
